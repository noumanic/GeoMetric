[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning

[flake8]
max-line-length = 100
exclude =
    .venv,
    venv,
    __pycache__,
    data/,
    outputs/,
    .git
ignore =
    E501,
    W503,
    E203,
    E402

[mypy]
python_version = 3.10
ignore_missing_imports = True
warn_unused_imports = True
